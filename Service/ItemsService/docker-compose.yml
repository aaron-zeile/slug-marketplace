services:
  postgres:
    container_name: ItemService
    image: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5431:5432"
    volumes:
      - ./src/sql/schema.sql:/docker-entrypoint-initdb.d/2.schema.sql
      - ./src/sql/data.sql:/docker-entrypoint-initdb.d/3.data.sql
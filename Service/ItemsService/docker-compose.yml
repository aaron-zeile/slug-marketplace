services:
  postgres:
    container_name: ItemService
    image: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5431:5432"
    volumes:
      - ./src/sql/schema.sql:/docker-entrypoint-initdb.d/2.schema.sql
      - ./src/sql/data.sql:/docker-entrypoint-initdb.d/3.data.sql
  app:
    build: .
    ports:
      - "4000:4000"
    depends_on:
      - postgres
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
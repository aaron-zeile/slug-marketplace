services:
  db:
    image: postgres:16-alpine
    container_name: slugmarketplace_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sluguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-slugpassword}
      POSTGRES_DB: ${POSTGRES_DB:-slugmarketplace}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sluguser} -d ${POSTGRES_DB:-slugmarketplace}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

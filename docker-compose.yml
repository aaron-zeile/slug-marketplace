services:
  app:
    container_name: app
    env_file: .env
    build:
      context: .
      args:
        ADMIN_DATABASE_URL: ${ADMIN_DATABASE_URL}
    depends_on:
      - postgres
    ports:
      - "3000:3000"
      - "3002:3002"
      - "3010:3010"
      - "4010:4010"
      - "4700:4700"
    environment:
      E2E_MOCK_GOOGLE_CREDENTIAL: ${E2E_MOCK_GOOGLE_CREDENTIAL:-}
      ITEMS_SERVICE_URL: http://localhost:4500/graphql
      LOGIN_SERVICE_URL: http://localhost:4010/api/v0
      ORDER_SERVICE_URL: http://localhost:4700/graphql
      ORDER_POSTGRES_DB: orders
      POSTGRES_HOST: postgres
      ADMIN_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/admindb
      SESSION_SECRET: ${SESSION_SECRET}
      ADMIN_INTERNAL_SECRET: ${ADMIN_INTERNAL_SECRET}
  postgres:
    container_name: postgres
    image: postgres:alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./Service/Login/sql/databases.sql:/docker-entrypoint-initdb.d/01.databases.sql
      - ./Service/Login/sql/schema.sql:/docker-entrypoint-initdb.d/02.schema.sql
      - ./Service/ItemsService/src/sql/databases.sql:/docker-entrypoint-initdb.d/03.databases.sql
      - ./Service/ItemsService/src/sql/schema.sql:/docker-entrypoint-initdb.d/04.schema.sql
      - ./Service/ItemsService/src/sql/data.sql:/docker-entrypoint-initdb.d/05.data.sql
      - ./App/seller/server/sql/databases.sql:/docker-entrypoint-initdb.d/06.databases.sql
      - ./App/seller/server/sql/schema.sql:/docker-entrypoint-initdb.d/07.schema.sql
      - ./App/admin/db/databases.sql:/docker-entrypoint-initdb.d/08.databases.sql
      - ./App/admin/db/schema.sql:/docker-entrypoint-initdb.d/09.schema.sql
      - ./App/admin/db/data.sql:/docker-entrypoint-initdb.d/10.data.sql
      - ./Service/Cart/src/sql/databases.sql:/docker-entrypoint-initdb.d/11.databases.sql
      - ./Service/Cart/src/sql/schema.sql:/docker-entrypoint-initdb.d/12.schema.sql
      - ./Service/Order/src/sql/databases.sql:/docker-entrypoint-initdb.d/13.databases.sql
      - ./Service/Order/src/sql/schema.sql:/docker-entrypoint-initdb.d/14.schema.sql
